# ─────────────────────────────────────────────────────────────────────────────
# Smart Relay ESP32-C3 — Firmware ESPHome
# Relay inteligente de 1 canal para instalacion residencial 110/220V AC
# Hardware: ESP32-C3-MINI-1-N4 + HLK-5M05 + HF115F-I + PC817C
# Migracion a C6: cambiar variant, board, GPIOs segun tabla en seccion 18
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  device_name: "smart-relay-c3"
  friendly_name: "Smart Relay C3"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: "domotica.smart-relay"
    version: "1.0.0"

esp32:
  variant: esp32c3
  board: esp32-c3-devkitm-1
  framework:
    type: arduino    # C3 soporta Arduino e IDF en ESPHome (C6 solo IDF)

# ── Conectividad ──────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret ap_password

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# ── Rele (GPIO4 -> SS8050 driver -> HF115F-I bobina) ─────────────────────────

output:
  - platform: gpio
    id: relay_output
    pin: GPIO4

switch:
  - platform: output
    id: relay
    name: "${friendly_name} Relay"
    output: relay_output
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:electric-switch"

# ── Interruptor fisico de pared (PC817C optoacoplador en GPIO5) ───────────────
# El optoacoplador tira GPIO5 a LOW cuando el switch esta cerrado (AC presente)
# Modo Edge: cada cambio de estado del switch (abrir o cerrar) alterna el rele
# Funciona localmente sin WiFi ni Home Assistant

binary_sensor:
  - platform: gpio
    id: wall_switch
    name: "${friendly_name} Wall Switch"
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true    # PC817 activo = GPIO LOW = logica invertida
    filters:
      - delayed_on_off: 50ms    # Debounce: 50 ms hardware RC + 50 ms firmware
    on_state:
      then:
        - switch.toggle: relay

  # Boton BOOT (GPIO9) como factory reset con presion prolongada >= 5 s
  - platform: gpio
    id: boot_button
    name: "${friendly_name} Button"
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on_off: 5ms
    on_multi_click:
      # Presion corta (< 1 s): toggle manual del rele
      - timing:
          - ON for at most 1s
        then:
          - switch.toggle: relay
      # Presion prolongada (>= 5 s): factory reset
      - timing:
          - ON for at least 5s
        then:
          - button.press: factory_reset_btn

button:
  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn

  - platform: restart
    name: "${friendly_name} Restart"

# ── LED de estado (GPIO6, active-low) ─────────────────────────────────────────

status_led:
  pin:
    number: GPIO6
    inverted: true

# ── Sensor de temperatura NTC (GPIO3 ADC, proteccion termica a 80 C) ─────────
# Configuracion downstream: NTC entre GPIO y GND, pull-up 10k a 3.3V
# Replica el diseno de la Shelly Plus 1 (NTC 10k B=3350 en GPIO32)

sensor:
  - platform: adc
    id: temp_adc
    pin: GPIO3
    attenuation: 12db
    update_interval: 30s

  - platform: resistance
    id: temp_res
    sensor: temp_adc
    configuration: DOWNSTREAM
    resistor: 10kOhm

  - platform: ntc
    sensor: temp_res
    name: "${friendly_name} Temperature"
    id: board_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    calibration:
      b_constant: 3350
      reference_resistance: 10kOhm
      reference_temperature: 298.15K
    on_value_range:
      - above: 80.0
        then:
          - switch.turn_off: relay
          - logger.log:
              level: ERROR
              format: "THERMAL SHUTDOWN: Board temperature %.1f C exceeded 80 C threshold"
              args: ['x']

  # Diagnostico: tiempo de actividad
  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s

  # Diagnostico: intensidad de senal WiFi
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

# ── Diagnosticos adicionales ──────────────────────────────────────────────────

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
    ssid:
      name: "${friendly_name} SSID"
    mac_address:
      name: "${friendly_name} MAC Address"

  - platform: version
    name: "${friendly_name} Firmware Version"
